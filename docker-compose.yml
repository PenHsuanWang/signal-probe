services:
  postgres:
    image: postgres:16-alpine
    container_name: signal-probe-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: signal_probe
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d signal_probe"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
