name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  # ── Verify CI passes on the tagged commit ────────────────────────────────
  verify:
    name: Verify (backend + frontend)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Backend — ruff lint
        working-directory: backend
        run: |
          uv sync
          uv run ruff check app/

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend — build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Upload frontend dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ── Create GitHub Release ─────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download frontend dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist/

      - name: Package frontend dist
        run: |
          VERSION="${{ github.ref_name }}"
          zip -r "signal-probe-frontend-${VERSION}.zip" frontend-dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.ref_name }}"
          gh release create "${VERSION}" \
            "signal-probe-frontend-${VERSION}.zip" \
            --title "Signal Probe ${VERSION}" \
            --generate-notes
