name: CI

on:
  push:
    branches: ["dev", "master"]
  pull_request:
    branches: ["dev", "master"]

jobs:
  # ── Backend: ruff lint ─────────────────────────────────────────────────────
  backend-checks:
    name: Backend — ruff
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check app/

      - name: Ruff format check
        run: uv run ruff format --check app/

  # ── Frontend: TypeScript + ESLint + Vite build ────────────────────────────
  frontend-checks:
    name: Frontend — tsc + eslint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Type-check + Vite build
        run: npm run build
